apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rsyslog
  name: rsyslog-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rsyslog
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: rsyslog
    spec:
      containers:
      - name: rsyslog
        image: rsyslog:1.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: log-volume
            mountPath: /var/log
      volumes:
        - name: log-volume
          emptyDir:
            sizeLimit: 500Mi
